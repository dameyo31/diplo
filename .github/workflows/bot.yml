name: Diplomacia Otomatik Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  calistir:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.47.0-jammy
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Bağımlılıkları kur
        run: npm install

      - name: Botu çalıştır
        env:
          DIPLOMACIA_STORAGE: ${{ secrets.DIPLOMACIA_STORAGE }}
          DIPLOMACIA_COOKIES: ${{ secrets.DIPLOMACIA_COOKIES }}
        run: node bot.js

      - name: Çalışma programı başlangıcını kaydet (ilk çalıştırmada)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if [ -n "$(git status --porcelain state.json 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Çalışma programı başlangıcını kaydet"
            git push
          else
            echo "state.json değişmedi, commit gerekmiyor."
          fi
